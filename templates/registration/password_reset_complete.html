{% extends 'base.html' %}

{% block title %}Password Reset Complete — ExamFind{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div style="width: 100%; max-width: 440px;">
    <div class="card p-5 text-center">
      <div style="font-size: 3rem; color: var(--success); margin-bottom: 1rem;"><i class="bi bi-shield-check-fill"></i></div>
      <h3>Password Changed!</h3>
      <p style="color: var(--text-muted); margin: 1rem 0 2rem;">
        Your password has been set. You can now sign in with your new password.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
      </a>
    </div>
  </div>
</div>
{% endblock %}
