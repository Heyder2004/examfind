{% extends 'base.html' %}

{% block title %}Reset Password — ExamFind{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div style="width: 100%; max-width: 440px;">
    <div class="card p-5">
      <div class="text-center mb-4">
        <div style="font-size: 2.5rem; color: var(--accent);"><i class="bi bi-key-fill"></i></div>
        <h3 class="mt-2">Reset Password</h3>
        <p style="color: var(--text-muted);">Enter your email and we'll send you reset instructions.</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label" style="color: var(--text-muted); font-size: 0.875rem;">Email Address</label>
          <input type="email" name="email" class="form-control" required autofocus placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </form>

      <hr style="border-color: var(--border); margin: 1.5rem 0;">
      <p class="text-center mb-0" style="color: var(--text-muted); font-size: 0.875rem;">
        Remember your password?
        <a href="{% url 'login' %}" style="color: var(--primary-light);">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
